<!DOCTYPE html>
<html>
<head>
    <title> Already Vote</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        .success-icon {
            font-size: 60px;
            color: green;
        }

        h2 {
            margin-top: 15px;
            color: #333;
        }

        p {
            color: #666;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="success-icon">✔</div>
        <h2>Already voted </h2>
        <p>Thank you for participating in the election.</p>

        <a href="/" class="btn">Go Home</a>
    </div>

</body>
</html>
