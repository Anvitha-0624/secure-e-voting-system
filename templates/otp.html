<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #002147;
            color: white;
            padding: 20px;
            text-align: center;
        }

        footer {
            margin-top: 80px;
            padding: 15px;
            background-color: #002147;
            color: white;
            text-align: center;
        }
        .center-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;   /* controls vertical center */
        }
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .otp-card {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #0d47a1;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 5px;
            text-align: center;
    
        }

        input:focus {
            border-color: #1976d2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        .resend {
            margin-top: 15px;
            font-size: 13px;
        }

        .resend a {
            color: #1976d2;
            text-decoration: none;
        }

    </style>
</head>
<body>
    <div class="header">
        <h1> Election Commission</h1>
        <p>Secure Online Voting Portal</p>
    </div>

<div class="main-content">
<div class="otp-card">
    <h2>OTP Verification</h2>
    <p>Enter the OTP sent to your email or phone</p>

    <form method="POST" action="/otp">
    <input type="text" id="otpInput" name="otp" placeholder="Enter OTP"
        maxlength="6" pattern="[0-9]{6}" required>
        <button type="submit">Verify OTP</button>
    </form>
    <small id="otpError" style="color:red; display:none;">
        Invalid OTP. Please try again.
    </small>

    <div class="resend">
        Didn’t receive OTP?
        <a href="/resend-otp">Resend OTP</a>
    </div>
</div>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {

    var otp = document.getElementById("otpInput").value;
    var error = document.getElementById("otpError");

    // Check if OTP is exactly 6 digits
    if (!/^[0-9]{6}$/.test(otp)) {
        e.preventDefault();
        error.style.display = "block";
    } else {
        error.style.display = "none";
    }

});
</script>
<footer>
    © 2026 Secure E-Voting System
</footer>

</body>
</html>
