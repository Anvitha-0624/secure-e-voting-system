<!DOCTYPE html>
<html>
<head>
    <title>Voter Registration</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
        }

        .header {
            background-color: #002147;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        footer {
            margin-top: 80px;
            padding: 15px;
            background-color: #002147;
            color: white;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #0d47a1;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #1976d2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0d47a1;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #1976d2;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: gray;
        }

        @media (max-width: 500px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1> Election Commission</h1>
        <p>Secure Online Voting Portal</p>
    </div>


    <div class="container">
        <div class="logo">EVOTING SYSTEM</div>
        <div class="subtitle">Secure Online Voter Registration</div>

        <form method="POST" id="registerForm">

            <input type="text" name="voter_id" placeholder="Voter ID" required>

            <input type="text" name="phone" placeholder="Phone Number" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <input type="password" id="password" name="password" placeholder="Password" required>

            <input type="password" id="confirm_password" placeholder="Confirm Password" required>
            <input type="checkbox" onclick="togglePassword()">show password

            <small id="passError" style="color:red; display:none;">
                Passwords do not match
            </small>

            <button type="submit">Register</button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login">Login here</a>
        </div>
    </div>
<!-- confirm psd-->
    <script>
    document.getElementById("confirm_password").addEventListener("keyup", function() {

        var pass = document.getElementById("password").value;
        var confirmPass = document.getElementById("confirm_password").value;
        var error = document.getElementById("passError");

        if (pass !== confirmPass) {
            error.style.display = "block";
        } else {
            error.style.display = "none";
        }

    });
    </script>


    <script>
    function togglePassword() {
        var pass = document.getElementById("password");
        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    }
    </script>


<!-- when password dont match  stp subm -->
    <script>
            document.getElementById("registerForm").addEventListener("submit", function(event) {

            var pass = document.getElementById("password").value;
            var confirmPass = document.getElementById("confirm_password").value;
            var error = document.getElementById("passError");

            if (pass !== confirmPass) {
                error.style.display = "block";
                event.preventDefault(); // Stop form submit
            } else {
                error.style.display = "none";
            }

        });
    </script>
    <footer>
        © 2026 Secure E-Voting System
    </footer>

</body>
</html>
